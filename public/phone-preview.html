<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>米豆天气 · 手机预览</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    margin: 0; padding: 0;
  }

  /* 全屏容器 — 用绝对定位避开 Vite HMR 注入干扰 */
  #app-shell {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 0;
  }

  body {
    background:
      radial-gradient(ellipse 80% 60% at 50% 30%, rgba(147,197,253,0.35), transparent),
      radial-gradient(ellipse 60% 80% at 20% 70%, rgba(167,139,250,0.15), transparent),
      radial-gradient(ellipse 60% 80% at 80% 20%, rgba(56,189,248,0.12), transparent),
      linear-gradient(160deg, #e8f0fe 0%, #f0f4ff 30%, #fafbff 60%, #eaf0fb 100%);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Microsoft YaHei", sans-serif;
    user-select: none;
  }

  /* ── 背景装饰圆 ── */
  .bg-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    pointer-events: none;
  }
  .bg-orb-1 { width: 420px; height: 420px; background: rgba(147,197,253,0.2); top: -5%; left: -8%; }
  .bg-orb-2 { width: 320px; height: 320px; background: rgba(167,139,250,0.12); bottom: -10%; right: -5%; }

  /* ── 页面标题 ── */
  .page-title {
    position: fixed;
    top: 32px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 10;
  }
  .page-title h1 {
    font-size: 20px;
    font-weight: 600;
    color: #1e293b;
    letter-spacing: -0.3px;
  }
  .page-title .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #38bdf8;
    animation: pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 0.4; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.2); }
  }

  /* ── 手机外框（银白钛金属风格） ── */
  .phone-wrapper {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 20px;
  }

  .phone {
    position: relative;
    width: 390px;
    height: 844px;
    /* 银白钛金属底色 */
    background: linear-gradient(145deg, #e8e9eb 0%, #d4d5d8 25%, #e3e4e6 50%, #c8c9cc 75%, #dcdee0 100%);
    border-radius: 48px;
    box-shadow:
      0 0 0 2px #c0c1c4,
      0 0 0 4px #d8d9db,
      0 0 0 6px rgba(180,185,195,0.5),
      0 0 0 7px rgba(200,205,215,0.3),
      0 24px 80px rgba(0,0,0,0.18),
      0 8px 32px rgba(0,0,0,0.1),
      inset 0 1px 0 rgba(255,255,255,0.4);
    overflow: hidden;
    transition: transform 0.3s ease;
    /* 屏幕发光效果 */
    filter: brightness(1.05);
  }

  /* ── 动态岛 ── */
  .phone::before {
    content: "";
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 126px;
    height: 34px;
    background: #1a1a1e;
    border-radius: 20px;
    z-index: 20;
  }

  /* ── 状态栏 ── */
  .status-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 54px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding: 0 28px 8px 28px;
    z-index: 19;
    pointer-events: none;
    color: #1a1a1e;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: -0.2px;
  }
  .status-bar .time { opacity: 0.9; }
  .status-bar .icons {
    display: flex;
    align-items: center;
    gap: 6px;
    opacity: 0.8;
  }
  .status-bar .icons svg { width: 16px; height: 16px; }

  /* ── Home Indicator ── */
  .phone::after {
    content: "";
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 134px;
    height: 5px;
    background: rgba(0,0,0,0.15);
    border-radius: 100px;
    z-index: 21;
  }

  /* ── 屏幕发光 ── */
  .screen-glow {
    position: absolute;
    top: 50px;
    left: 50%;
    transform: translateX(-50%);
    width: 370px;
    height: 780px;
    background: radial-gradient(ellipse 100% 15% at 50% 50%, rgba(255,255,255,0.25), transparent 70%);
    border-radius: 0 0 44px 44px;
    z-index: 5;
    pointer-events: none;
    animation: screen-breathe 4s ease-in-out infinite;
  }
  @keyframes screen-breathe {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 0.9; }
  }

  /* ── 屏幕内容区 ── */
  .screen {
    position: absolute;
    top: 54px;
    left: 0;
    right: 0;
    bottom: 0;
    overflow: hidden;
    border-radius: 0 0 48px 48px;
    z-index: 1;
  }

  .screen iframe {
    width: 390px;
    height: calc(844px - 54px);
    border: none;
    display: block;
    pointer-events: auto;
  }

  /* ── 底部提示 ── */
  .hint {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 13px;
    color: #64748b;
    display: flex;
    align-items: center;
    gap: 6px;
    z-index: 10;
    animation: fade-hint 3s ease-in-out infinite;
  }
  .hint svg { opacity: 0.5; }
  @keyframes fade-hint {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  /* ── 响应式: 小屏幕缩放 ── */
  @media (max-height: 900px) {
    .phone { transform: scale(0.82); margin-top: -60px; }
  }
  @media (max-height: 750px) {
    .phone { transform: scale(0.68); margin-top: -100px; }
  }
  @media (max-width: 480px) {
    .phone { transform: scale(min(0.92, calc(100vw / 420))); }
  }
</style>
</head>
<body>

<div id="app-shell">

<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>

<div class="page-title">
  <h1>米豆天气</h1>
  <span class="dot"></span>
</div>

<div class="phone-wrapper">
  <div class="phone">
    <!-- 状态栏 -->
    <div class="status-bar">
      <span class="time" id="status-time">9:41</span>
      <span class="icons">
        <!-- 信号 -->
        <svg viewBox="0 0 18 12" fill="currentColor">
          <rect x="0" y="8" width="3" height="4" rx="0.5"/>
          <rect x="4" y="6" width="3" height="6" rx="0.5"/>
          <rect x="8" y="3" width="3" height="9" rx="0.5"/>
          <rect x="12" y="0" width="3" height="12" rx="0.5"/>
        </svg>
        <!-- WiFi -->
        <svg viewBox="0 0 18 13" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M3 5.5a8.5 8.5 0 0 1 12 0"/>
          <path d="M5.5 8a4.7 4.7 0 0 1 7 0"/>
          <circle cx="9" cy="10.8" r="1" fill="currentColor" stroke="none"/>
        </svg>
        <!-- 电池 -->
        <svg viewBox="0 0 28 14" fill="none" stroke="currentColor" stroke-width="1.2">
          <rect x="0" y="1" width="23" height="12" rx="3"/>
          <rect x="24" y="4" width="2.5" height="6" rx="1"/>
          <rect x="2.5" y="3.5" width="16" height="7" rx="1.5" fill="currentColor" stroke="none"/>
        </svg>
      </span>
    </div>

    <!-- 屏幕发光层 -->
    <div class="screen-glow"></div>

    <!-- App 屏幕 -->
    <div class="screen">
      <iframe id="app-iframe" src="about:blank" title="米豆天气"></iframe>
    </div>
  </div>
</div>

<div class="hint">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M12 5v14M5 12l7 7 7-7"/>
  </svg>
  鼠标滚轮滑动 · 点击操作
</div>

<script>
  // 动态 iframe 地址 — 自适应 file:// / localhost / 内网 IP
  (function initIframe() {
    var iframe = document.getElementById('app-iframe');
    var host = window.location.hostname || 'localhost';
    var port = 5173;
    // file:// 协议下 hostname 为空，回退 localhost
    if (!host || host === '') host = 'localhost';
    iframe.src = 'http://' + host + ':' + port + '/?mock=1';
  })();

  // 更新时间
  function updateTime() {
    var now = new Date();
    document.getElementById('status-time').textContent =
      now.getHours().toString().padStart(2,'0') + ':' +
      now.getMinutes().toString().padStart(2,'0');
    requestAnimationFrame(function() { setTimeout(updateTime, 30000); });
  }
  updateTime();
</script>

</div><!-- /app-shell -->

</body>
</html>
